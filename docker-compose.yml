services:
  web:
    build:
      context: ./app
    container_name: vision-dashboard
    restart: unless-stopped
    command: gunicorn --reload -w 1 -b 0.0.0.0:8000 run:app
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
      - "20000:20000/udp"
    environment:
      VIDEO_HLS_URL: ${VIDEO_HLS_URL:-http://localhost:8888/livecam/index.m3u8}
      DASHBOARD_REFRESH_MS: ${DASHBOARD_REFRESH_MS:-2000}
      UDP_LABEL_BIND_IP: ${UDP_LABEL_BIND_IP:-0.0.0.0}
      UDP_LABEL_BIND_PORT: ${UDP_LABEL_BIND_PORT:-20000}
      UDP_LABEL_BUFFER_SIZE: ${UDP_LABEL_BUFFER_SIZE:-4096}
      UDP_LABEL_MAX_RECENT: ${UDP_LABEL_MAX_RECENT:-120}
      UDP_LABEL_CSV_PATH: ${UDP_LABEL_CSV_PATH:-/app/udp_listener_log.csv}
    extra_hosts:
      - "host.docker.internal:host-gateway"
