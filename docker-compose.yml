services:
  web:
    build:
      context: ./app
    container_name: drone-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "20000:20000/udp"
    environment:
      VIDEO_HLS_URL: ${VIDEO_HLS_URL:-http://localhost:8888/dronecam/index.m3u8}
      DASHBOARD_REFRESH_MS: ${DASHBOARD_REFRESH_MS:-2000}
      UDP_LABEL_BIND_IP: ${UDP_LABEL_BIND_IP:-0.0.0.0}
      UDP_LABEL_BIND_PORT: ${UDP_LABEL_BIND_PORT:-20000}
      UDP_LABEL_BUFFER_SIZE: ${UDP_LABEL_BUFFER_SIZE:-4096}
      UDP_LABEL_MAX_RECENT: ${UDP_LABEL_MAX_RECENT:-120}
      UDP_LABEL_CSV_PATH: ${UDP_LABEL_CSV_PATH:-/app/udp_listener_log.csv}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: drone-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
