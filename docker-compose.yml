services:
  yolo_sender:
    build:
      context: ./yolo-udp-sender
    container_name: yolo-udp-sender
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - /dev:/dev
    environment:
      PORTAL_HOST: ${PORTAL_HOST}
      UDP_PORT: ${UDP_PORT:-20000}
      SOURCE: ${SOURCE:-/dev/video0}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
      CONF: ${CONF:-0.45}
      IMGSZ: ${IMGSZ:-640}
      COOLDOWN: ${COOLDOWN:-1.5}
      STREAM_FPS: ${STREAM_FPS:-20}
      STREAM_WIDTH: ${STREAM_WIDTH:-1280}
      STREAM_HEIGHT: ${STREAM_HEIGHT:-720}
      RTSP_TRANSPORT: ${RTSP_TRANSPORT:-tcp}
      HEALTH_PORT: ${HEALTH_PORT:-8080}
      LOG_CSV_PATH: ${LOG_CSV_PATH:-/app/yolo_stream_sender_log.csv}
      MEDIA_MTX_RTSP_URL: ${MEDIA_MTX_RTSP_URL:-}
      UDP_IP: ${UDP_IP:-}
